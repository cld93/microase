name: Microase CI

on:
  push:
    branches:
      - main
jobs:
    test_calc:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Install Newman
          run: npm install -g newman
        - name: Set up Docker
          uses: docker/setup-buildx-action@v3

        # test calc...
        - name: Build calc image
          run: docker build -t calc-service -f ./microase/src/calc/Dockerfile_test ./microase/src/calc
        - name: Run calc container
          run: docker run -d -p 5000:5000 --name calc-container calc-service
        - name: Wait for calc to start
          run: sleep 5
        - name: Test calc with Newman
          run: newman run microase/tests/calc_ut.postman_collection.json
        - name: Stop calc container
          if: always()
          run: docker stop calc-container && docker rm calc-container

    test_string:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4
        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: '20'
        - name: Install Newman
          run: npm install -g newman
        - name: Set up Docker
          uses: docker/setup-buildx-action@v3

        # test string...
        - name: Build string image
          run: docker build -t string-service -f ./microase/src/string/Dockerfile_test ./microase/src/string
        - name: Run string container
          run: docker run -d -p 5000:5000 --name string-container string-service
        - name: Wait for string to start
          run: sleep 5
        - name: Test string with Newman
          run: newman run microase/tests/string_ut.postman_collection.json
        - name: Stop string container
          if: always()
          run: docker stop string-container && docker rm string-container
    
    integrations:
        needs: [test_calc, test_string]
        runs-on: ubuntu-latest
        steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Node
          uses: actions/setup-node@v4
          with:
            node-version: '20'

        - name: Install Newman
          run: npm install -g newman

        - name: Set up Docker
          uses: docker/setup-buildx-action@v3

        - name: Build full architecture
          run: docker compose -f microase/src/docker-compose.yml build
          
        - name: Run full architecture
          run: docker compose -f microase/src/docker-compose.yml up -d

        - name: Wait for architecture to start
          run: sleep 10
        
        - name: Test integration with Newman
          run: newman run microase/tests/integration.postman_collection.json

        - name: Stop full architecture
          if: always()
          run: docker compose -f microase/src/docker-compose.yml down
